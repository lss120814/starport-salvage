<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VOID//SALVAGE — 成长树</title><style>
button:focus-visible,a:focus-visible{outline:2px solid #4fd6d0;outline-offset:3px}
:root{--bg:#05080d;--text:#eaf1ef;--muted:#819097;--blue:#38bdf8;--violet:#d65cff;--green:#79ed59;--gold:#ffc94a}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif}body{background:radial-gradient(circle at 50% 92%,rgba(255,201,74,.13),transparent 17%),radial-gradient(circle at 16% 50%,rgba(56,189,248,.08),transparent 26%),radial-gradient(circle at 84% 50%,rgba(121,237,89,.08),transparent 26%),#05080d}header{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(15px,4vw,58px);border-bottom:1px solid #20303b;position:sticky;top:0;background:rgba(5,8,13,.92);backdrop-filter:blur(10px);z-index:20}.brand{font-weight:900;letter-spacing:.1em}.nav{display:flex;align-items:center;gap:20px}.nav a{color:#a8b4b7;text-decoration:none;font-size:12px}.wallet{font:800 17px/1 ui-monospace,monospace;color:var(--gold)}.intro{text-align:center;padding:34px 18px 4px}.intro small{color:var(--gold);letter-spacing:.2em;font:700 10px/1 ui-monospace,monospace}.intro h1{font-size:clamp(44px,6vw,78px);margin:10px 0 7px;letter-spacing:-.055em}.intro p{margin:0;color:var(--muted);font-size:13px}.tree-wrap{width:100%;overflow-x:auto;padding:18px 0 65px}.tree{width:max(1160px,100%);height:1080px;position:relative;margin:auto}.canopy{position:absolute;inset:45px 2.5% 190px;display:grid;grid-template-columns:repeat(3,1fr);gap:45px}.branch{--c:var(--blue);position:relative;border-radius:45% 45% 18% 18%;background:linear-gradient(90deg,transparent 49.6%,color-mix(in srgb,var(--c) 38%,transparent) 50%,transparent 50.4%)}.branch.violet{--c:var(--violet)}.branch.green{--c:var(--green)}.branch:before{content:"";position:absolute;left:50%;bottom:-122px;width:4px;height:180px;background:var(--c);transform-origin:bottom;transform:rotate(var(--lean));box-shadow:0 0 12px var(--c),0 0 30px color-mix(in srgb,var(--c) 55%,transparent)}.blue{--lean:26deg}.violet{--lean:0deg}.green{--lean:-26deg}.branch-title{position:absolute;top:0;left:50%;transform:translateX(-50%);padding:10px 25px;border:1px solid var(--c);background:#081018;color:var(--c);font-weight:900;letter-spacing:.08em;box-shadow:0 0 22px color-mix(in srgb,var(--c) 24%,transparent);white-space:nowrap}.stem{position:absolute;inset:72px 0 0;display:flex;flex-direction:column-reverse;align-items:center;gap:46px}.fork{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:16px;position:relative}.fork:before{content:"";position:absolute;left:24%;right:24%;top:50%;height:3px;background:var(--c);box-shadow:0 0 12px var(--c)}.node,.bud{width:min(275px,92%);min-height:100px;padding:14px 15px 13px 67px;border:1px solid #33434d;background:rgba(8,15,21,.97);position:relative;z-index:2;transition:.25s;animation:grow .45s ease both}.fork .node,.fork .bud{width:100%}.node:before,.bud:before{content:"";position:absolute;left:16px;top:50%;width:37px;height:37px;border-radius:50%;transform:translateY(-50%);border:2px solid #5c6870;background:#151d23}.node.available{border-color:var(--c);box-shadow:0 0 24px color-mix(in srgb,var(--c) 18%,transparent)}.node.available:before{border-color:var(--c);box-shadow:0 0 16px var(--c);background:color-mix(in srgb,var(--c) 28%,#101820)}.node.owned{border-color:var(--c);background:color-mix(in srgb,var(--c) 8%,#081018)}.node.owned:before{border-color:var(--c);background:var(--c);box-shadow:0 0 22px var(--c)}.node h3{font-size:14px;margin:0 0 5px}.node p{color:var(--muted);font-size:10px;line-height:1.45;margin:0 0 8px}.node footer{display:flex;align-items:center;justify-content:space-between;gap:8px}.node em{font:700 9px/1 ui-monospace,monospace;color:#9dadb1;font-style:normal}.node button{height:28px;padding:0 11px;border:1px solid #52616a;background:transparent;color:white;font:800 9px/1 ui-monospace,monospace;cursor:pointer}.node button:not(:disabled):hover{border-color:var(--gold);color:var(--gold)}.node button:disabled{opacity:.55;cursor:default}.bud{display:grid;place-items:center;padding:0;border:1px dashed color-mix(in srgb,var(--c) 36%,#26333a);background:rgba(5,9,13,.75);color:color-mix(in srgb,var(--c) 55%,#65747a);font:800 10px/1.5 ui-monospace,monospace;letter-spacing:.12em}.bud:before{left:50%;top:50%;transform:translate(-50%,-50%);width:17px;height:17px;border-color:var(--c);background:transparent;box-shadow:0 0 13px var(--c)}.bud span{margin-top:48px}.root{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);width:290px;height:125px;border:2px solid var(--gold);border-radius:65px 65px 20px 20px;background:radial-gradient(circle,var(--gold) 0 9px,#553f16 10px 24px,#0b1116 25px);box-shadow:0 0 34px rgba(255,201,74,.3);display:flex;align-items:flex-end;justify-content:center;padding-bottom:13px;font-weight:900;letter-spacing:.08em}.root:before{content:"";position:absolute;top:-82px;left:50%;height:82px;border-left:5px solid var(--gold);box-shadow:0 0 12px var(--gold)}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#111b21;border:1px solid var(--gold);padding:12px 18px;font:700 10px/1 ui-monospace,monospace;transition:.25s;z-index:30}.toast.show{opacity:1;transform:translate(-50%,0)}@keyframes grow{from{opacity:0;transform:translateY(22px) scale(.96)}to{opacity:1;transform:none}}
@media(max-width:700px){header{height:58px}.nav a:nth-child(2){display:none}.intro{padding-top:25px}.tree{transform:scale(.78);transform-origin:top left;width:1480px;height:1230px}.tree-wrap{height:1010px}.canopy{gap:25px}.node p{font-size:12px}.node em{font-size:11px}}
.tree:before{content:"";position:absolute;left:50%;top:145px;height:65px;border-left:5px solid var(--gold);box-shadow:0 0 14px var(--gold)}.canopy{inset:210px 2.5% 45px}.canopy:before{content:"";position:absolute;left:16.66%;right:16.66%;top:-22px;height:4px;background:var(--gold);box-shadow:0 0 12px var(--gold)}.branch:before{top:-22px;bottom:auto;height:22px;transform:none;transform-origin:top}.stem{flex-direction:column}.root{top:20px;bottom:auto;align-items:center;padding:45px 0 0}.root:before{top:auto;bottom:-65px;height:65px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.tree-summary{width:min(760px,calc(100% - 30px));margin:18px auto 0;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid #263944;background:rgba(7,14,20,.88)}.tree-summary div{padding:13px 16px;border-right:1px solid #263944}.tree-summary div:last-child{border:0}.tree-summary span{display:block;color:var(--muted);font:800 8px/1 ui-monospace,monospace;letter-spacing:.13em}.tree-summary strong{display:block;margin-top:7px;color:var(--gold);font:900 17px/1 ui-monospace,monospace}.intro small:before{content:"V10 · ";color:var(--green)}.node.available{transform:translateY(-2px)}.node.available button{border-color:var(--c);color:var(--c)}
@media(max-width:700px){.tree-summary{grid-template-columns:1fr}.tree-summary div{border-right:0;border-bottom:1px solid #263944}.tree-wrap{height:auto;overflow:visible;padding:24px 14px 60px}.tree{width:100%;height:auto;transform:none;display:flex;flex-direction:column}.tree:before,.canopy:before,.branch:before,.fork:before{display:none}.root{position:relative;order:-1;left:auto;top:auto;bottom:auto;transform:none;width:min(290px,88vw);height:112px;margin:0 auto 46px;padding-top:40px}.root:after{content:"";position:absolute;left:50%;bottom:-46px;height:46px;border-left:4px solid var(--gold);box-shadow:0 0 12px var(--gold)}.canopy{position:static;display:flex;flex-direction:column;gap:34px}.branch{min-height:0;padding:0 10px 30px;background:linear-gradient(90deg,transparent 49.5%,color-mix(in srgb,var(--c) 34%,transparent) 50%,transparent 50.5%)}.branch-title{position:relative;top:auto;left:auto;transform:none;width:max-content;margin:0 auto 20px}.stem{position:relative;inset:auto;display:flex;flex-direction:column;gap:18px}.fork{grid-template-columns:1fr;gap:18px}.node,.fork .node{width:min(100%,420px);margin:auto;min-height:98px}.node p{font-size:11px}.node em{font-size:10px}.nav{gap:10px}.intro{padding-inline:12px}}
</style></head><body><header><div class="brand">VOID//SALVAGE</div><div class="nav"><a href="index.html?v=10">← 返回机库</a><a href="game.html?v=10&threat=2">直接出航</a><span class="wallet"><span id="credits">0</span> CR</span></div></header><section class="intro"><small>PERSISTENT DEVELOPMENT</small><h1>成长树</h1><p>枝条只会在前置节点生长后显现；高级分叉会改变玩法，而不只是增加数字。</p><div class="tree-summary"><div><span>成长完成度</span><strong id="completion">0%</strong></div><div><span>累计远征</span><strong id="runs">0</strong></div><div><span>完整通关</span><strong id="victories">0</strong></div></div></section><main class="tree-wrap"><div class="tree"><div class="canopy" id="canopy"></div><div class="root">基础船体核心</div></div></main><div class="toast" id="toast">新枝条已生长</div><script>

const $=s=>document.querySelector(s),KEY='void-salvage-tree-v4';
let save=JSON.parse(sessionStorage.getItem(KEY)||'null');if(!save){save={version:4,credits:0,owned:[],runs:0,victories:0};sessionStorage.setItem(KEY,JSON.stringify(save))}save.owned??=[];const branches=[
{name:'机动枝干',cls:'blue',nodes:[{id:'engine1',name:'冷启动引擎',desc:'移动速度 +6%',cost:120},{id:'engine2',name:'矢量喷口',desc:'移动速度再 +8%',cost:420,pre:'engine1'},{id:'agile',name:'轻量船壳',desc:'碰撞体积 -10%',cost:900,pre:'engine2',fork:1},{id:'overdrive',name:'过载推进',desc:'速度 +14%，危险速度 +5%',cost:900,pre:'engine2',fork:1},{id:'navigator',name:'深空导航',desc:'危险阵列提前 1.8 秒预警',cost:2000,any:['agile','overdrive']},{id:'phase',name:'相位航迹',desc:'终极：每局抵消首次致命撞击',cost:5000,pre:'navigator'}]},
{name:'回收枝干',cls:'violet',nodes:[{id:'tractor1',name:'微型牵引场',desc:'解锁 45px 衰减磁力',cost:150},{id:'tractor2',name:'场域增幅',desc:'磁力范围提升至 75px',cost:480,pre:'tractor1'},{id:'tractorWide',name:'广域牵引',desc:'范围 110px，远处吸力较弱',cost:1000,pre:'tractor2',fork:1},{id:'yield1',name:'精炼协议',desc:'资产收益 +8%',cost:1000,pre:'tractor2',fork:1},{id:'yield2',name:'稳定压缩器',desc:'资产收益再 +10%',cost:2200,any:['tractorWide','yield1']},{id:'rarecore',name:'黑箱协议',desc:'终极：稀有资产与危险同时增加',cost:5200,pre:'yield2'}]},
{name:'防御枝干',cls:'green',nodes:[{id:'shield1',name:'偏转护盾',desc:'开局防御 +1',cost:180},{id:'fuel1',name:'短程燃料舱',desc:'每航段时间 +4 秒',cost:520,pre:'shield1'},{id:'shield2',name:'双层偏转阵列',desc:'开局防御再 +1',cost:1100,pre:'fuel1',fork:1},{id:'fuel2',name:'深空燃料',desc:'每航段时间再 +6 秒',cost:1100,pre:'fuel1',fork:1},{id:'recharge',name:'应急重启',desc:'进入下一航段恢复 1 防御',cost:2400,any:['shield2','fuel2']},{id:'apex',name:'远航核心',desc:'终极：开局防御再 +1',cost:5500,pre:'recharge'}]}];
const has=id=>save.owned.includes(id),all=branches.flatMap(b=>b.nodes),ready=n=>(!n.pre||has(n.pre))&&(!n.any||n.any.some(has)),revealed=n=>ready(n)||has(n.id);
function card(n){if(!revealed(n))return '';let owned=has(n.id),afford=save.credits>=n.cost,short=Math.max(0,n.cost-save.credits);return `<article class="node ${owned?'owned':'available'}"><h3>${n.name}</h3><p>${n.desc}</p><footer><em>${owned?'已生长':afford?'可解锁':'还差 '+short+' CR'}</em><button data-id="${n.id}" ${owned||!afford?'disabled':''}>${owned?'完成':n.cost+' CR'}</button></footer></article>`}
function render(){$('#credits').textContent=(save.credits||0).toLocaleString();$('#completion').textContent=Math.round(save.owned.length/all.length*100)+'%';$('#runs').textContent=save.runs||0;$('#victories').textContent=save.victories||0;$('#canopy').innerHTML=branches.map(b=>{let base=b.nodes.filter(n=>!n.fork),fork=b.nodes.filter(n=>n.fork),ordered=[base[0],base[1],{fork},base[2],base[3]].filter(Boolean);return `<section class="branch ${b.cls}"><div class="branch-title">${b.name}</div><div class="stem">${ordered.map(x=>x.fork?`<div class="fork">${x.fork.map(card).join('')}</div>`:card(x)).join('')}</div></section>`}).join('');document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>buy(b.dataset.id))}
function buy(id){let n=all.find(n=>n.id===id);if(!n||has(id)||!ready(n)||save.credits<n.cost)return;save.credits-=n.cost;save.owned.push(id);sessionStorage.setItem(KEY,JSON.stringify(save));render();let t=$('#toast');t.textContent=n.name+' 已生长 · 新枝条显现';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}render();

</script></body></html>
