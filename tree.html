<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#05080d"><title>VOID//SALVAGE — 成长树</title><style>
:root{--bg:#05080d;--panel:#0a1117;--text:#eaf1ef;--muted:#718087;--blue:#38bdf8;--violet:#d65cff;--green:#79ed59;--gold:#ffc94a}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif}body{background:radial-gradient(circle at 50% 88%,rgba(255,201,74,.12),transparent 18%),radial-gradient(circle at 18% 48%,rgba(56,189,248,.08),transparent 28%),radial-gradient(circle at 82% 48%,rgba(121,237,89,.08),transparent 28%),#05080d}.mono{font-family:ui-monospace,monospace}header{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,58px);border-bottom:1px solid #20303b;position:sticky;top:0;background:rgba(5,8,13,.9);backdrop-filter:blur(10px);z-index:20}.brand{font-weight:900;letter-spacing:.1em}.nav{display:flex;align-items:center;gap:20px}.nav a{color:#9babb0;text-decoration:none;font-size:12px}.wallet{font:800 17px/1 ui-monospace,monospace;color:var(--gold)}.intro{text-align:center;padding:38px 18px 8px}.intro small{color:var(--gold);letter-spacing:.2em;font:700 9px/1 ui-monospace,monospace}.intro h1{font-size:clamp(42px,6vw,78px);margin:12px 0 8px;letter-spacing:-.055em}.intro p{margin:0;color:var(--muted);font-size:13px}.tree-wrap{width:min(1440px,100%);margin:auto;overflow-x:auto;padding:28px 16px 70px}.tree{width:max(1040px,100%);min-height:950px;position:relative;padding:70px 30px 180px}.branches{height:720px;display:grid;grid-template-columns:repeat(3,1fr);gap:80px;position:relative}.branches:after{content:"";position:absolute;left:16.66%;right:16.66%;bottom:-52px;height:110px;border:3px solid var(--gold);border-top:0;border-radius:0 0 50% 50%;filter:drop-shadow(0 0 10px var(--gold));opacity:.8}.branch{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:36px;position:relative;padding-bottom:16px}.branch:before{content:"";position:absolute;top:58px;bottom:-55px;left:50%;width:4px;background:var(--c);box-shadow:0 0 10px var(--c),0 0 28px var(--c);z-index:0}.branch:after{content:"";position:absolute;top:0;width:110px;height:52px;border:3px solid var(--c);border-bottom:0;clip-path:polygon(0 100%,0 42%,20% 70%,35% 8%,50% 62%,66% 8%,81% 70%,100% 42%,100% 100%);background:color-mix(in srgb,var(--c) 24%,transparent);filter:drop-shadow(0 0 10px var(--c))}.branch.blue{--c:var(--blue)}.branch.violet{--c:var(--violet)}.branch.green{--c:var(--green)}.branch-title{position:absolute;top:76px;padding:11px 30px;border:1px solid var(--c);background:#081018;color:var(--c);font-weight:900;letter-spacing:.08em;box-shadow:0 0 22px color-mix(in srgb,var(--c) 24%,transparent)}.node{width:min(290px,88%);min-height:98px;padding:14px 16px 14px 70px;border:1px solid #33434d;background:rgba(8,15,21,.96);position:relative;z-index:2;transition:.25s;animation:grow .4s ease both}.node:before{content:"";position:absolute;left:17px;top:50%;width:38px;height:38px;border-radius:50%;transform:translateY(-50%);border:2px solid #5c6870;background:#151d23}.node.available{border-color:var(--c);box-shadow:0 0 24px color-mix(in srgb,var(--c) 18%,transparent)}.node.available:before{border-color:var(--c);box-shadow:0 0 16px var(--c);background:color-mix(in srgb,var(--c) 28%,#101820)}.node.owned{border-color:var(--gold)}.node.owned:before{border-color:var(--gold);background:var(--gold);box-shadow:0 0 22px var(--gold)}.node h3{font-size:14px;margin:0 0 5px}.node p{color:var(--muted);font-size:10px;line-height:1.45;margin:0 0 9px}.node button{height:27px;padding:0 12px;border:1px solid #52616a;background:transparent;color:white;font:800 9px/1 ui-monospace,monospace;cursor:pointer}.node button:not(:disabled):hover{border-color:var(--gold);color:var(--gold)}.node button:disabled{opacity:.5;cursor:default}.ghost{height:98px;width:min(290px,88%);border:1px dashed #1d2a31;z-index:2;background:rgba(5,9,13,.72);display:grid;place-items:center;color:#405059;font:700 9px/1.5 ui-monospace,monospace}.root{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);width:270px;height:112px;border:2px solid var(--gold);border-radius:60px 60px 18px 18px;background:radial-gradient(circle,var(--gold) 0 9px,#553f16 10px 23px,#0b1116 24px);box-shadow:0 0 30px rgba(255,201,74,.28);display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;font-weight:900;letter-spacing:.08em}.root:before{content:"";position:absolute;top:-52px;left:50%;height:52px;border-left:4px solid var(--gold);box-shadow:0 0 12px var(--gold)}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#111b21;border:1px solid var(--gold);padding:12px 18px;font:700 10px/1 ui-monospace,monospace;transition:.25s;z-index:30}.toast.show{opacity:1;transform:translate(-50%,0)}@keyframes grow{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}@media(max-width:700px){header{height:58px}.nav a:nth-child(2){display:none}.intro{padding-top:26px}.tree-wrap{padding-left:0;padding-right:0}.tree{transform-origin:top left}.branches{gap:32px}.node{width:290px}.branch-title{padding-left:18px;padding-right:18px}}
</style></head><body><header><div class="brand">VOID//SALVAGE</div><div class="nav"><a href="index.html">← 返回机库</a><a href="game.html">直接出航</a><span class="wallet"><span id="credits">0</span> CR</span></div></header><section class="intro"><small>PERSISTENT DEVELOPMENT</small><h1>成长树</h1><p>从基础船体向上生长；解锁一个节点，新的枝条才会显现。</p></section><main class="tree-wrap"><div class="tree"><div class="branches" id="branches"></div><div class="root">基础船体核心</div></div></main><div class="toast" id="toast">新枝条已生长</div><script>
const $=s=>document.querySelector(s),KEY='void-salvage-tree-v3';let save=JSON.parse(localStorage.getItem(KEY)||'null')||{credits:0,owned:[]};save.owned??=[];const branches=[{name:'机动枝干',cls:'blue',nodes:[{id:'engine1',name:'冷启动引擎',desc:'移动速度 +12%',cost:35},{id:'time1',name:'短程燃料舱',desc:'任务时间 +5 秒',cost:55,pre:'engine1'},{id:'engine2',name:'矢量喷口',desc:'移动速度再 +15%',cost:125,pre:'time1'},{id:'time2',name:'稳定燃料舱',desc:'任务时间 +8 秒',cost:120,pre:'engine2'}]},{name:'牵引枝干',cls:'violet',nodes:[{id:'tractor1',name:'牵引场发生器',desc:'解锁 70px 衰减磁力场',cost:75},{id:'tractor2',name:'牵引场增幅器',desc:'磁力范围提升至 140px',cost:165,pre:'tractor1'},{id:'yield1',name:'资产压缩协议',desc:'信用点收益 +25%',cost:90,pre:'tractor2'},{id:'yield2',name:'黑箱回收协议',desc:'信用点收益再 +35%',cost:260,pre:'yield1'}]},{name:'防御枝干',cls:'green',nodes:[{id:'shield1',name:'偏转护盾',desc:'开局防御值 +1',cost:95},{id:'shield2',name:'双层偏转阵列',desc:'开局防御值再 +1',cost:195,pre:'shield1'},{id:'time3',name:'深空燃料舱',desc:'任务时间 +12 秒',cost:220,pre:'shield2'},{id:'apex',name:'远航核心',desc:'任务 +10 秒，速度 +18%',cost:360,pre:'time3'}]}];const has=id=>save.owned.includes(id);function render(){$('#credits').textContent=(save.credits||0).toLocaleString();$('#branches').innerHTML=branches.map(b=>`<section class="branch ${b.cls}"><div class="branch-title">${b.name}</div>${[...b.nodes].reverse().map(n=>{let reveal=!n.pre||has(n.pre);if(!reveal)return `<div class="ghost">LOCKED BRANCH</div>`;let owned=has(n.id),afford=save.credits>=n.cost;return `<article class="node ${owned?'owned':'available'}"><h3>${n.name}</h3><p>${n.desc}</p><button data-id="${n.id}" ${owned||!afford?'disabled':''}>${owned?'已生长':n.cost+' CR'}</button></article>`}).join('')}</section>`).join('');document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>buy(b.dataset.id))}function buy(id){let n=branches.flatMap(b=>b.nodes).find(n=>n.id===id);if(!n||has(id)||save.credits<n.cost)return;save.credits-=n.cost;save.owned.push(id);localStorage.setItem(KEY,JSON.stringify(save));render();let t=$('#toast');t.textContent=n.name+' 已生长 · 新枝条显现';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}render();
</script></body></html>
