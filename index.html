<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#05090b"><title>VOID//SALVAGE — 机库</title><style>
:root{--bg:#05090b;--line:#243238;--text:#eef3ef;--muted:#718086;--green:#b8ed58;--cyan:#4fd6d0}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif}body{overflow-x:hidden;background:radial-gradient(circle at 73% 42%,rgba(79,214,208,.12),transparent 28%),linear-gradient(135deg,#05090b,#0a1114)}body:before{content:"";position:fixed;inset:0;opacity:.18;pointer-events:none;background:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:46px 46px}.mono{font-family:ui-monospace,"Cascadia Mono",monospace}header{height:70px;padding:0 clamp(18px,4vw,62px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}.brand{font-weight:900;letter-spacing:.1em}.credits{font:800 17px/1 ui-monospace,monospace;color:var(--green)}main{min-height:calc(100vh - 70px);display:grid;grid-template-columns:minmax(360px,650px) 1fr;align-items:center;gap:7vw;width:min(1500px,calc(100% - 48px));margin:auto;position:relative;z-index:1;padding:55px 0}.eyebrow{font:700 10px/1 ui-monospace,monospace;letter-spacing:.22em;color:var(--green)}h1{font-size:clamp(66px,9vw,142px);letter-spacing:-.085em;line-height:.78;margin:32px 0 36px}h1 span{display:block;color:transparent;-webkit-text-stroke:1px #6b797d;margin-left:.32em}.copy{max-width:540px;color:#92a0a3;line-height:1.85;font-size:15px}.actions{display:grid;grid-template-columns:1.35fr 1fr;gap:12px;margin-top:38px}.actions a{height:68px;border:1px solid #3b4a4f;display:flex;align-items:center;justify-content:space-between;padding:0 21px;text-decoration:none;color:white;font-weight:900;letter-spacing:.05em}.actions a:first-child{background:var(--green);border-color:var(--green);color:#091009}.actions small{font:700 9px/1 ui-monospace,monospace;opacity:.6}.actions a:hover{transform:translateY </style></head><body><header><div class="brand">VOID//SALVAGE</div><div class="credits"><span id="credits">0</span> CR</div></header><main><section><div class="eyebrow">ORBITAL RECOVERY UNIT / HANGAR</div><h1>残骸带<span>回收协议</span></h1><p class="copy">驾驶单人回收艇进入失控轨道，带回资产，避开致命残骸。每次作业结算的信用点，都能在独立成长树中永久强化下一次出航。</p><div class="actions"><a href="game.html">开始本次作业 <small>ENTER SECTOR →</small></a><a href="tree.html">进入成长树 <small>DEVELOPMENT →</small></a></div><div class="spec"><div>BASE HULL<b>1 LIFE</b></div><div>INITIAL RUN<b id="duration">5 SEC</b></div><div>TRACTOR<b id="tractor">OFF</b></div></div></section><section class="visual" aria-hidden="true"><div class="ring"><div class="orbit"><i></i></div><div class="ship"></div></div></section></main><script>const KEY='void-salvage-tree-v3',s=JSON.parse(localStorage.getItem(KEY)||'null')||{credits:0,owned:[]},h=id=>(s.owned||[]).includes(id);document.querySelector('#credits').textContent=(s.credits||0).toLocaleString();document.querySelector('#duration').textContent=(5+(h('time1')?5:0)+(h('time2')?8:0)+(h('time3')?12:0)+(h('apex')?10:0))+' SEC';document.querySelector('#tractor').textContent=h('tractor2')?'140 PX':h('tractor1')?'70 PX':'OFF';</script></body></html>
