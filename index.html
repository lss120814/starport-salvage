<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07091a">
  <title>星港回收站｜霓虹街机小游戏</title>
  <meta name="description" content="接住星光，躲开陨石。支持键盘与触屏的免费街机小游戏。">
  <style>
    :root{--ink:#f7f7ff;--muted:#aeb9db;--cyan:#63e8ff;--pink:#ff59d3;--yellow:#fff075}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);background:#07091a;font-family:Inter,"Segoe UI","Microsoft YaHei",system-ui,sans-serif}button,kbd{font:inherit}button{cursor:pointer}
    main{min-height:100vh;overflow:hidden;background:radial-gradient(circle at 13% 20%,rgba(77,80,220,.22),transparent 30%),radial-gradient(circle at 90% 72%,rgba(255,62,191,.13),transparent 27%),#07091a}
    .topbar{width:min(1280px,calc(100% - 48px));margin:auto;height:86px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.09)}
    .brand{display:flex;gap:11px;align-items:center;color:white;font-weight:700}.mark{display:grid;place-items:center;width:34px;height:34px;border:1px solid rgba(99,232,255,.55);color:var(--cyan);border-radius:10px;box-shadow:inset 0 0 16px rgba(99,232,255,.14)}
    .best{color:var(--muted);font:12px/1 ui-monospace,monospace;letter-spacing:.08em}.best strong{color:var(--yellow);margin-left:8px;font-size:15px}
    .hero{width:min(1280px,calc(100% - 48px));margin:auto;padding:58px 0 36px;display:grid;grid-template-columns:.72fr 1.28fr;gap:64px;align-items:center}.eyebrow{color:var(--cyan);font:12px/1.4 ui-monospace,monospace;letter-spacing:.14em;margin:0 0 22px}h1{margin:0;font-size:clamp(54px,6vw,90px);line-height:.94;letter-spacing:-.065em}h1 em{color:transparent;font-style:normal;-webkit-text-stroke:1px rgba(255,255,255,.7);text-shadow:0 0 28px rgba(255,89,211,.2)}.lede{max-width:430px;margin:28px 0 34px;color:var(--muted);line-height:1.75;font-size:15px}
    .howto{display:grid;gap:10px}.howto div{display:flex;align-items:center;min-height:34px;color:#8590b3;font-size:12px}kbd{min-width:30px;height:30px;display:inline-grid;place-items:center;color:#e5e8ff;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-bottom-color:rgba(255,255,255,.25);border-radius:7px;margin-right:5px;font-size:11px}.howto span{margin-left:8px}
    .game{background:rgba(11,15,42,.72);border:1px solid rgba(132,161,255,.22);border-radius:24px;padding:13px;box-shadow:0 32px 100px rgba(0,0,0,.45),inset 0 1px rgba(255,255,255,.08);backdrop-filter:blur(18px)}.hud{display:grid;grid-template-columns:repeat(3,1fr);height:69px;align-items:center;padding:0 14px}.hud>div{display:flex;flex-direction:column;gap:4px}.hud>div:nth-child(2){align-items:center}.hud>div:last-child{align-items:flex-end}.hud span{color:#7884a8;font:10px/1 ui-monospace,monospace;letter-spacing:.14em}.hud strong{font:700 20px/1 ui-monospace,monospace}.combo strong{color:var(--yellow)}.lives strong{color:var(--pink);font-size:14px;letter-spacing:4px}
    .stage{position:relative;overflow:hidden;border-radius:16px;border:1px solid rgba(100,232,255,.19);background:#0b0e27;aspect-ratio:800/520;touch-action:none}canvas{display:block;width:100%;height:100%}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:20px;background:rgba(5,8,28,.52);backdrop-filter:blur(5px)}.card{width:min(390px,90%);padding:30px;text-align:center;border:1px solid rgba(255,255,255,.15);border-radius:20px;background:rgba(9,13,40,.86);box-shadow:0 20px 60px rgba(0,0,0,.4)}.icon{display:inline-grid;place-items:center;width:52px;height:52px;color:var(--yellow);border:1px solid rgba(255,240,117,.35);border-radius:50%;font-size:23px}.card h2{margin:16px 0 8px;font-size:27px}.card p{margin:0 auto 22px;color:var(--muted);font-size:13px;line-height:1.6}.card button{width:100%;border:0;border-radius:12px;padding:13px 20px;color:#080b1e;background:var(--cyan);font-weight:800;box-shadow:0 8px 30px rgba(99,232,255,.21)}.card button:hover{transform:translateY(-2px)}
    .controls{display:none;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.controls button{border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:white;background:rgba(255,255,255,.07);font-weight:700}.controls button:active{background:rgba(99,232,255,.2)}footer{width:min(1280px,calc(100% - 48px));margin:auto;padding:22px 0 28px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;color:#596484;font:11px/1.4 ui-monospace,monospace;letter-spacing:.08em}
    @media(max-width:980px){.hero{grid-template-columns:1fr;gap:38px;padding-top:42px}.intro{text-align:center}.lede{margin-left:auto;margin-right:auto}.howto{display:none}.game{width:min(760px,100%);margin:auto}h1{font-size:clamp(56px,11vw,86px)}}
    @media(max-width:620px){.topbar,.hero,footer{width:calc(100% - 24px)}.topbar{height:68px}.best{font-size:9px}.hero{padding:36px 0 24px;gap:30px}h1{font-size:clamp(48px,15vw,68px)}.lede{font-size:14px;margin-bottom:0}.game{padding:8px;border-radius:18px}.hud{height:58px;padding:0 8px}.hud strong{font-size:16px}.hud span{font-size:8px}.controls{display:grid}.card{padding:22px}footer{flex-direction:column;gap:8px}}
  </style>
</head>
<body><main>
  <header class="topbar"><div class="brand"><span class="mark">✦</span><span>星港回收站</span></div><div class="best">个人最佳 <strong id="best">0</strong></div></header>
  <section class="hero"><div class="intro"><p class="eyebrow">STARPORT SALVAGE · 07</p><h1>接住星光。<br><em>躲开陨石。</em></h1><p class="lede">驾驶你的微型回收舰，在星港关闭前收集尽可能多的星核。连击越高，得分越快。</p><div class="howto"><div><kbd>←</kbd><kbd>→</kbd><span>移动飞船</span></div><div><kbd>A</kbd><kbd>D</kbd><span>也可以移动</span></div><div><kbd>空格</kbd><span>暂停游戏</span></div></div></div>
    <div class="game"><div class="hud"><div><span>得分</span><strong id="score">0000</strong></div><div class="combo"><span>连击</span><strong id="combo">×0</strong></div><div class="lives"><span>生命</span><strong id="lives">◆ ◆ ◆</strong></div></div><div class="stage" id="stage"><canvas id="canvas" width="800" height="520"></canvas><div class="overlay" id="overlay"><div class="card"><span class="icon" id="icon">✦</span><h2 id="title">准备发射？</h2><p id="message">黄色星核会加分，红色陨石会损伤飞船。</p><button id="start">开始任务</button></div></div></div><div class="controls"><button id="left">←</button><button id="pause">Ⅱ</button><button id="right">→</button></div></div>
  </section><footer><span>一场轻松的星际小冒险</span><span>拖动屏幕也能控制飞船</span></footer>
</main>
<script>
const W=800,H=520,canvas=document.querySelector('#canvas'),ctx=canvas.getContext('2d');let state='idle',score=0,lives=3,combo=0,px=400,drops=[],spawn=0,last=0;const keys={left:false,right:false};
const $=s=>document.querySelector(s),scoreEl=$('#score'),comboEl=$('#combo'),livesEl=$('#lives'),bestEl=$('#best'),overlay=$('#overlay');bestEl.textContent=localStorage.getItem('starport-best')||0;
function ui(){scoreEl.textContent=String(score).padStart(4,'0');comboEl.textContent='×'+combo;livesEl.textContent=[0,1,2].map(i=>i<lives?'◆':'◇').join(' ')}
function show(type){state=type;overlay.style.display='grid';$('#icon').textContent=type==='over'?'☄':type==='paused'?'Ⅱ':'✦';$('#title').textContent=type==='over'?'本轮结束':type==='paused'?'暂时停靠':'准备发射？';$('#message').textContent=type==='over'?`你回收了 ${score} 点星光。`:type==='paused'?'补充一下能量，随时继续。':'黄色星核会加分，红色陨石会损伤飞船。';$('#start').textContent=type==='over'?'再来一局':type==='paused'?'继续任务':'开始任务'}
function start(){if(state==='paused'){state='playing';overlay.style.display='none';return}score=0;lives=3;combo=0;px=400;drops=[];spawn=0;ui();state='playing';overlay.style.display='none'}
function pause(){if(state==='playing')show('paused');else if(state==='paused')start()}
function end(){const best=Math.max(score,+(localStorage.getItem('starport-best')||0));localStorage.setItem('starport-best',best);bestEl.textContent=best;show('over')}
function draw(t){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#090c22');g.addColorStop(1,'#17234d');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(let i=0;i<74;i++){ctx.fillStyle=`rgba(255,255,255,${.3+.45*Math.sin(t/700+i)})`;ctx.fillRect((i*109+31)%W,(i*67+17)%H,i%9?1:2,i%9?1:2)}ctx.strokeStyle='rgba(100,232,255,.12)';for(let x=0;x<=W;x+=50){ctx.beginPath();ctx.moveTo(x,410);ctx.lineTo(W/2+(x-W/2)*1.9,H);ctx.stroke()}for(let y=410;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
for(const d of drops){ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.spin);if(d.kind==='star'){ctx.shadowColor='#ffe86f';ctx.shadowBlur=22;ctx.fillStyle='#fff27a';ctx.beginPath();for(let i=0;i<10;i++){let r=i%2?d.size*.42:d.size,a=-Math.PI/2+i*Math.PI/5;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill()}else{ctx.shadowColor='#ff5f77';ctx.shadowBlur=14;ctx.fillStyle='#fe6178';ctx.beginPath();for(let i=0;i<8;i++){let r=d.size*(i%2?.75:1),a=i*Math.PI/4;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill()}ctx.restore()}
ctx.save();ctx.translate(px,462);ctx.shadowColor='#66ecff';ctx.shadowBlur=22;ctx.fillStyle='#dffbff';ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(29,17);ctx.lineTo(10,12);ctx.lineTo(0,22);ctx.lineTo(-10,12);ctx.lineTo(-29,17);ctx.closePath();ctx.fill();ctx.fillStyle='#ff4fd8';ctx.beginPath();ctx.moveTo(-8,20);ctx.lineTo(0,37+Math.sin(t/70)*4);ctx.lineTo(8,20);ctx.fill();ctx.restore()}
function loop(t){let dt=Math.min((t-last)/16.67,2.2)||1;last=t;if(state==='playing'){if(keys.left)px-=7.5*dt;if(keys.right)px+=7.5*dt;px=Math.max(34,Math.min(W-34,px));spawn+=dt;if(spawn>Math.max(24,54-score/45)){spawn=0;drops.push({x:28+Math.random()*(W-56),y:-30,speed:2.2+Math.random()*1.6+score/900,size:13+Math.random()*8,kind:Math.random()<Math.min(.2+score/2200,.45)?'meteor':'star',spin:Math.random()*Math.PI})}let keep=[];for(const d of drops){d.y+=d.speed*dt;d.spin+=.025*dt;let hit=d.y>425&&d.y<492&&Math.abs(d.x-px)<36;if(hit){if(d.kind==='star'){combo++;score+=10+Math.min(combo,10)*2}else{lives--;combo=0;if(lives<=0)end()}ui()}else if(d.y<H+30)keep.push(d);else if(d.kind==='star'){combo=0;ui()}}drops=keep}draw(t);requestAnimationFrame(loop)}
addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight',' ','a','d','A','D'].includes(e.key))e.preventDefault();if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')keys.left=true;if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')keys.right=true;if(e.key===' ')pause()});addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a')keys.left=false;if(e.key==='ArrowRight'||e.key.toLowerCase()==='d')keys.right=false});
function hold(id,key){let b=$(id);b.onpointerdown=()=>keys[key]=true;b.onpointerup=b.onpointerleave=()=>keys[key]=false}hold('#left','left');hold('#right','right');$('#pause').onclick=pause;$('#start').onclick=start;$('#stage').onpointermove=e=>{if((e.buttons||e.pointerType==='touch')&&state==='playing'){let r=canvas.getBoundingClientRect();px=Math.max(34,Math.min(W-34,(e.clientX-r.left)/r.width*W))}};requestAnimationFrame(loop);
</script></body></html>
