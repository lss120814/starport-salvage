<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#080b0d"><title>VOID//SALVAGE — 机库</title>
  <style>
    :root{--bg:#080b0d;--panel:#0d1215;--line:#263239;--text:#e9edea;--muted:#77858a;--green:#b8ed58;--cyan:#4fd6d0;--amber:#e8ad4c}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif}button,a{font:inherit}.mono{font-family:ui-monospace,"Cascadia Mono",monospace}.micro{font:700 9px/1.4 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
    body{background:radial-gradient(circle at 85% 15%,rgba(79,214,208,.08),transparent 26%),linear-gradient(120deg,#080b0d,#0a0e10)}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.18;background:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:42px 42px}
    header{height:72px;padding:0 clamp(20px,4vw,64px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);position:relative;z-index:2}.brand{display:flex;align-items:center;gap:13px;font-weight:800;letter-spacing:.08em}.sigil{width:29px;height:29px;border:1px solid #587061;position:relative}.sigil:before,.sigil:after{content:"";position:absolute;background:var(--green)}.sigil:before{width:11px;height:1px;left:8px;top:13px}.sigil:after{width:1px;height:11px;left:13px;top:8px}.wallet{text-align:right}.wallet strong{display:block;color:var(--green);font:800 19px/1.2 ui-monospace,monospace;margin-top:2px}
    main{position:relative;z-index:1;width:min(1500px,calc(100% - 48px));margin:auto;min-height:calc(100vh - 72px);display:grid;grid-template-columns:minmax(320px,430px) 1fr;gap:clamp(35px,5vw,80px);padding:clamp(38px,6vh,72px) 0 50px}.brief{position:sticky;top:34px;height:max-content;padding-top:16px}.eyebrow{color:var(--green);font:700 10px/1 ui-monospace,monospace;letter-spacing:.2em;display:flex;align-items:center;gap:12px}.eyebrow:before{content:"";width:30px;height:1px;background:var(--green)}h1{font-size:clamp(54px,6.2vw,91px);line-height:.87;letter-spacing:-.075em;margin:28px 0 26px}h1 span{display:block;color:transparent;-webkit-text-stroke:1px #697579;margin-left:.4em}.desc{color:#93a0a1;line-height:1.85;font-size:14px;margin:0 0 30px;max-width:410px}.run-spec{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:28px}.run-spec div{padding:17px 8px 17px 0}.run-spec strong{display:block;margin-top:6px;font:800 18px/1 ui-monospace,monospace}.launch{display:flex;align-items:center;justify-content:space-between;width:100%;height:62px;padding:0 20px;background:var(--green);border:0;color:#091009;text-decoration:none;font-weight:900;letter-spacing:.07em;text-transform:uppercase;transition:.18s}.launch span{font:700 9px/1 ui-monospace,monospace;opacity:.55}.launch:hover{background:#d4ff78;box-shadow:0 0 40px rgba(184,237,88,.16);transform:translateY(-2px)}.legend{margin-top:19px;color:#637277;font:10px/1.7 ui-monospace,monospace}
    .growth{min-width:0}.growth-head{display:flex;justify-content:space-between;align-items:end;padding-bottom:18px;border-bottom:1px solid var(--line)}.growth-head h2{font-size:25px;margin:5px 0 0;letter-spacing:-.03em}.growth-head p{margin:0;color:var(--muted);font:10px/1.6 ui-monospace,monospace;text-align:right}.tree-shell{min-height:660px;padding:38px clamp(12px,4vw,58px);border-left:1px solid var(--line);border-right:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.018),transparent)}
    .tree{display:flex;flex-direction:column;align-items:center;gap:26px}.row{width:100%;display:flex;justify-content:center;gap:clamp(26px,7vw,110px);position:relative;animation:reveal .35s ease both}.row:not(:first-child):before{content:"";position:absolute;left:50%;top:-26px;width:1px;height:26px;background:#34434a}.row.split:after{content:"";position:absolute;top:-1px;left:calc(25% + 18px);right:calc(25% + 18px);height:1px;background:#34434a}.row.split .node:before{content:"";position:absolute;left:50%;top:-27px;width:1px;height:27px;background:#34434a}.node{width:min(330px,44%);min-height:108px;border:1px solid #2c383e;background:#0c1114;padding:16px 17px;position:relative;transition:.18s}.row.single .node{width:min(360px,82%)}.node.available{border-color:#668347;box-shadow:0 0 0 1px rgba(184,237,88,.06),0 18px 48px rgba(0,0,0,.24)}.node.owned{border-color:#23473f;background:linear-gradient(120deg,rgba(79,214,208,.07),#0c1114)}.node-top{display:flex;align-items:start;justify-content:space-between;gap:12px}.code{color:var(--cyan);font:800 9px/1 ui-monospace,monospace;letter-spacing:.12em}.status{color:var(--muted);font:700 8px/1 ui-monospace,monospace;letter-spacing:.1em}.available .status{color:var(--green)}.owned .status{color:var(--cyan)}.node h3{font-size:15px;margin:10px 0 6px}.node p{font-size:11px;color:var(--muted);line-height:1.55;margin:0;padding-right:86px}.unlock{position:absolute;right:13px;bottom:13px;width:82px;height:34px;border:1px solid #425057;background:transparent;color:var(--text);font:800 9px/1 ui-monospace,monospace;cursor:pointer}.unlock:hover{border-color:var(--green);color:var(--green)}.unlock:disabled{cursor:default;border-color:#263239;color:#566469}.available:after{content:"";position:absolute;left:-1px;top:18px;bottom:18px;width:2px;background:var(--green)}.owned:after{content:"";position:absolute;left:-1px;top:18px;bottom:18px;width:2px;background:var(--cyan)}.empty{height:100px;display:grid;place-items:center;color:var(--muted);font:10px/1.5 ui-monospace,monospace}
    .toast{position:fixed;left:50%;bottom:25px;transform:translate(-50%,20px);padding:12px 18px;background:#131b1e;border:1px solid #45545a;color:var(--text);font:11px/1 ui-monospace,monospace;opacity:0;pointer-events:none;transition:.25s;z-index:5}.toast.show{opacity:1;transform:translate(-50%,0)}@keyframes reveal{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
    @media(max-width:980px){main{grid-template-columns:1fr;width:min(780px,calc(100% - 28px))}.brief{position:static;text-align:center}.eyebrow{justify-content:center}.desc{margin-left:auto;margin-right:auto}.tree-shell{min-height:0}.growth-head{padding-top:20px}}
    @media(max-width:600px){header{height:62px;padding:0 14px}.brand{font-size:12px}.wallet strong{font-size:15px}main{padding-top:28px}h1{font-size:55px}.tree-shell{padding:28px 6px}.row{gap:10px}.node,.row.single .node{width:calc(50% - 5px);padding:13px 11px;min-height:126px}.row.single .node{width:min(340px,96%)}.node p{padding-right:0;margin-bottom:40px}.unlock{left:11px;right:11px;width:auto}.growth-head p{display:none}}
  </style>
</head>
<body>
  <header><div class="brand"><div class="sigil"></div><span>VOID//SALVAGE</span></div><div class="wallet"><span class="micro">Available credits</span><strong><span id="credits">0</span> CR</strong></div></header>
  <main>
    <section class="brief"><div class="eyebrow">ORBITAL RECOVERY UNIT</div><h1>残骸带<span>成长协议</span></h1><p class="desc">从一次只有 5 秒的脆弱出航开始。回收资产、活着回来，再用信用点让下一次作业走得更远。成长节点只会在满足前置条件后显现。</p><div class="run-spec"><div><span class="micro">当前时限</span><strong id="duration">5 SEC</strong></div><div><span class="micro">防御值</span><strong id="defense">0 DEF</strong></div><div><span class="micro">牵引范围</span><strong id="tractor">OFF</strong></div></div><a href="game.html" class="launch">开始本次作业 <span>ENTER SECTOR →</span></a><div class="legend">基础船体：1 次致命撞击　·　无连击、无最高纪录<br>黄钻：标准资产　·　蓝环：高价值资产　·　红色残骸：致命威胁</div></section>
    <section class="growth"><div class="growth-head"><div><span class="micro">Persistent development</span><h2>成长树</h2></div><p>购入节点后<br>新节点才会显现</p></div><div class="tree-shell"><div class="tree" id="tree"></div></div></section>
  </main><div class="toast" id="toast">节点已解锁</div>
  <script>
  const $=s=>document.querySelector(s),KEY='void-salvage-tree-v3';
  let save=JSON.parse(localStorage.getItem(KEY)||'null')||{credits:0,owned:[]};save.owned??=[];
  const nodes=[
    {id:'engine1',name:'冷启动引擎',code:'ENG-01',desc:'移动速度 +12%',cost:35,pre:[],row:0},
    {id:'time1',name:'短程燃料舱',code:'FUEL-01',desc:'任务时间 +5 秒',cost:55,pre:['engine1'],row:1},
    {id:'tractor1',name:'牵引场发生器',code:'TRC-01',desc:'解锁 70px 衰减磁力场',cost:75,pre:['time1'],row:2},
    {id:'shield1',name:'偏转护盾',code:'DEF-01',desc:'开局防御值 +1',cost:95,pre:['tractor1'],row:3},
    {id:'yield1',name:'资产压缩协议',code:'YLD-01',desc:'信用点收益 +25%',cost:90,pre:['tractor1'],row:3},
    {id:'engine2',name:'矢量喷口',code:'ENG-02',desc:'移动速度再 +15%',cost:125,pre:['shield1'],row:4},
    {id:'time2',name:'稳定燃料舱',code:'FUEL-02',desc:'任务时间 +8 秒',cost:120,pre:['yield1'],row:4},
    {id:'tractor2',name:'牵引场增幅器',code:'TRC-02',desc:'磁力范围提升至 140px',cost:165,pre:['engine2','time2'],row:5},
    {id:'shield2',name:'双层偏转阵列',code:'DEF-02',desc:'开局防御值再 +1',cost:195,pre:['tractor2'],row:6},
    {id:'time3',name:'深空燃料舱',code:'FUEL-03',desc:'任务时间 +12 秒',cost:220,pre:['shield2'],row:7},
    {id:'yield2',name:'黑箱回收协议',code:'YLD-02',desc:'信用点收益再 +35%',cost:260,pre:['time3'],row:8},
    {id:'apex',name:'远航核心',code:'CORE-X',desc:'任务 +10 秒，速度 +18%',cost:360,pre:['yield2'],row:9}
  ];
  const has=id=>save.owned.includes(id),revealed=n=>n.pre.every(has);
  function stats(){return{duration:5+(has('time1')?5:0)+(has('time2')?8:0)+(has('time3')?12:0)+(has('apex')?10:0),defense:(has('shield1')?1:0)+(has('shield2')?1:0),tractor:has('tractor2')?140:has('tractor1')?70:0}}
  function render(){let s=stats();$('#credits').textContent=save.credits.toLocaleString();$('#duration').textContent=s.duration+' SEC';$('#defense').textContent=s.defense+' DEF';$('#tractor').textContent=s.tractor?s.tractor+' PX':'OFF';let rows=[...new Set(nodes.filter(revealed).map(n=>n.row))];$('#tree').innerHTML=rows.map(row=>{let list=nodes.filter(n=>n.row===row&&revealed(n));return `<div class="row ${list.length>1?'split':'single'}">${list.map(n=>{let owned=has(n.id),afford=save.credits>=n.cost;return `<article class="node ${owned?'owned':'available'}"><div class="node-top"><span class="code">${n.code}</span><span class="status">${owned?'INSTALLED':'AVAILABLE'}</span></div><h3>${n.name}</h3><p>${n.desc}</p><button class="unlock" data-id="${n.id}" ${owned||!afford?'disabled':''}>${owned?'已安装':n.cost+' CR'}</button></article>`}).join('')}</div>`}).join('')||'<div class="empty">NO DEVELOPMENT DATA</div>';
    document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>buy(b.dataset.id))}
  function buy(id){let n=nodes.find(x=>x.id===id);if(!n||has(id)||save.credits<n.cost)return;save.credits-=n.cost;save.owned.push(id);localStorage.setItem(KEY,JSON.stringify(save));render();let t=$('#toast');t.textContent=`${n.code} 已安装 · 新节点已显现`;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
  render();
  </script>
</body></html>
