<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VOID//SALVAGE — 远征作业</title>
<style>
:root{--green:#b8ed58;--cyan:#4fd6d0;--red:#ef635f;--gold:#ffc94a;--text:#edf2ef;--muted:#7f8d91;--line:#2b3a40}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#030608;color:var(--text);font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif}button{font:inherit}canvas{display:block;width:100%;height:100%;touch-action:none}.hud{position:absolute;inset:0;pointer-events:none;padding:20px clamp(14px,3vw,42px);display:flex;flex-direction:column;justify-content:space-between}.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:start}.block{display:flex;gap:30px}.block.right{justify-content:flex-end;text-align:right}.datum span,.micro{display:block;color:var(--muted);font:700 9px/1.3 ui-monospace,monospace;letter-spacing:.14em}.datum strong{display:block;font:800 21px/1 ui-monospace,monospace;margin-top:7px}.timer{min-width:178px;padding:10px 22px;background:rgba(4,8,10,.84);border-top:2px solid var(--green);text-align:center}.timer strong{font:800 28px/1 ui-monospace,monospace}.timer span{display:block;color:var(--muted);font:700 8px/1 ui-monospace,monospace;letter-spacing:.14em;margin-bottom:5px}.def{color:var(--cyan)}.hull{color:var(--red)}.bottom{display:flex;justify-content:space-between;align-items:end}.legend{background:rgba(4,8,10,.76);border-left:1px solid var(--line);padding:10px 14px;color:#7d8b8e;font:11px/1.7 ui-monospace,monospace}.legend b{font-weight:800}.a{color:var(--green)}.b{color:var(--cyan)}.c{color:var(--red)}.objective{width:min(460px,45vw);background:rgba(4,8,10,.76);padding:12px 15px;border-right:1px solid var(--line)}.objective-top{display:flex;justify-content:space-between;font:700 10px/1 ui-monospace,monospace;color:var(--muted);margin-bottom:9px}.objective-top strong{color:var(--text)}.bar{height:5px;background:#1c272b}.bar i{display:block;width:0;height:100%;background:var(--green);box-shadow:0 0 13px rgba(184,237,88,.55);transition:.2s}.pause{position:absolute;right:18px;top:50%;width:42px;height:42px;transform:translateY(-50%);pointer-events:auto;border:1px solid #3a494e;background:rgba(5,9,11,.82);color:#a9b3b1;cursor:pointer}.warning{position:absolute;left:50%;top:20%;transform:translateX(-50%);padding:9px 18px;border:1px solid var(--red);background:rgba(40,8,8,.78);color:#ff9d99;font:800 10px/1 ui-monospace,monospace;letter-spacing:.15em;opacity:0;transition:.2s}.warning.show{opacity:1}.modal{position:absolute;inset:0;display:grid;place-items:center;background:rgba(2,5,7,.86);backdrop-filter:blur(8px);z-index:5}.hidden{display:none}.report{width:min(680px,calc(100% - 28px));padding:clamp(25px,5vw,48px);border:1px solid #35444a;background:#091014;box-shadow:0 40px 120px #000}.line{height:2px;width:55px;background:var(--green);margin-bottom:20px}.report h1{font-size:clamp(38px,6vw,64px);line-height:1;margin:6px 0 12px;letter-spacing:-.05em}.report>p{color:#91a0a2;line-height:1.7;margin:0 0 24px}.stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);margin-bottom:24px}.stats div{padding:15px;border-right:1px solid var(--line)}.stats div:last-child{border:0}.stats span{display:block;color:var(--muted);font:700 9px/1 ui-monospace,monospace}.stats strong{display:block;font:800 21px/1 ui-monospace,monospace;margin-top:8px}.earned{color:var(--green)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions a,.actions button{height:54px;display:flex;align-items:center;justify-content:center;border:1px solid #3b4a4f;background:transparent;color:white;text-decoration:none;font-weight:800;cursor:pointer}.actions .primary{background:var(--green);border-color:var(--green);color:#091009}.mobile{display:none;position:absolute;left:50%;bottom:18px;transform:translateX(-50%);grid-template-columns:repeat(4,54px);gap:7px;pointer-events:auto}.mobile button{height:46px;border:1px solid #3b4a4f;background:rgba(5,9,11,.86);color:white}.launch-flash{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;background:#030608;z-index:4;animation:flash 1.2s ease forwards}.launch-flash strong{font:800 12px/1 ui-monospace,monospace;letter-spacing:.25em;color:var(--green)}@keyframes flash{0%,55%{opacity:1}100%{opacity:0;visibility:hidden}}
@media(max-width:720px){.hud{padding:12px}.top{grid-template-columns:1fr auto}.top>.block.right{display:none}.block{gap:14px}.datum strong{font-size:16px}.timer{min-width:120px;padding:8px 10px}.timer strong{font-size:22px}.legend{display:none}.bottom{padding-bottom:72px}.objective{width:100%}.mobile{display:grid}.pause{top:auto;bottom:78px}.report{padding:25px 20px}.stats strong{font-size:17px}}
</style>
</head>
<body>
<canvas id="game">
</canvas>
<div class="launch-flash">
<strong>SECTOR LINK ESTABLISHED</strong>
</div>
<div class="hud">
<div class="top">
<div class="block">
<div class="datum">
<span>UNBANKED</span>
<strong id="runCredits">0 CR</strong>
</div>
<div class="datum">
<span>STAGE</span>
<strong id="stageName">外围</strong>
</div>
</div>
<div class="timer">
<span>航段剩余时间</span>
<strong id="time">00:40</strong>
</div>
<div class="block right">
<div class="datum">
<span>DEFENSE</span>
<strong class="def" id="defense">0</strong>
</div>
<div class="datum">
<span>HULL</span>
<strong class="hull">I</strong>
</div>
</div>
</div>
<div class="warning" id="warning">危险阵列接近</div>
<div class="bottom">
<div class="legend">
<b class="a">▣</b> 标准货箱　<b class="b">⬡</b> 稀有核心　<b class="c">▰</b> 致命残骸<br>方向键 / WASD 接管飞船 · 移动鼠标切回航向控制 · ESC 暂停</div>
<div class="objective">
<div class="objective-top">
<span id="objectiveLabel">航段货值目标</span>
<strong id="objectiveValue">0 / 120 CR</strong>
</div>
<div class="bar">
<i id="bar">
</i>
</div>
</div>
</div>
</div>
<button class="pause" id="pause" aria-label="暂停">Ⅱ</button>
<div class="mobile">
<button data-key="left">←</button>
<button data-key="up">↑</button>
<button data-key="down">↓</button>
<button data-key="right">→</button>
</div>
<div class="modal hidden" id="modal">
<section class="report">
<div class="line">
</div>
<span class="micro" id="reportCode">STAGE SECURED</span>
<h1 id="reportTitle">航段已控制</h1>
<p id="reportCopy">
</p>
<div class="stats">
<div>
<span>回收货值</span>
<strong id="finalCargo">0 CR</strong>
</div>
<div>
<span>保险奖励</span>
<strong id="finalDefense">0 CR</strong>
</div>
<div>
<span>本次入账</span>
<strong class="earned" id="earned">—</strong>
</div>
</div>
<div class="actions" id="actions">
<button id="extract">安全撤离</button>
<button class="primary" id="continue">深入下一航段</button>
</div>
</section>
</div>
<script>

(()=>{const $=s=>document.querySelector(s),canvas=$('#game'),ctx=canvas.getContext('2d'),KEY='void-salvage-tree-v4',OLD='void-salvage-tree-v3';let W=1600,H=900;
function resize(){let d=Math.min(devicePixelRatio||1,1.5);canvas.width=innerWidth*d;canvas.height=innerHeight*d;W=canvas.width;H=canvas.height;ctx.setTransform(1,0,0,1,0,0)}resize();addEventListener('resize',resize);

let save=JSON.parse(localStorage.getItem(KEY)||'null');if(!save){let old=JSON.parse(localStorage.getItem(OLD)||'null')||{};save={version:4,credits:old.credits||0,owned:[]};localStorage.setItem(KEY,JSON.stringify(save))}save.owned??=[];const has=id=>save.owned.includes(id);const speedBase=430,speed=speedBase*(1+(has('engine1')?.06:0)+(has('engine2')?.08:0)+(has('overdrive')?.14:0)),hitScale=has('agile')?.9:1,tractor=has('tractorWide')?110:has('tractor2')?75:has('tractor1')?45:0,yieldMult=1+(has('yield1')?.08:0)+(has('yield2')?.1:0),startDefense=(has('shield1')?1:0)+(has('shield2')?1:0)+(has('apex')?1:0),fuel=(has('fuel1')?4:0)+(has('fuel2')?6:0),hazardBoost=has('rarecore')?.04:0,hazardSpeed=has('overdrive')?1.05:1,rareBoost=has('rarecore')?.06:0,phaseReady=has('phase'),navigator=has('navigator');

const stages=[{name:'外围废墟',time:40,min:30,target:120,risk:.23,spawn:.74,bonus:20,mult:1},{name:'紫晶坟场',time:50,min:40,target:300,risk:.34,spawn:.56,bonus:55,mult:1.55},{name:'熔毁航道',time:60,min:50,target:620,risk:.45,spawn:.43,bonus:120,mult:2.25}];let stage=0,state='playing',ship={x:W/2,y:H*.78,angle:-Math.PI/2},objects=[],particles=[],keys={},runCredits=0,stageValue=0,stageElapsed=0,insured=0,defense=startDefense,timeLeft=stages[0].time+fuel,spawnClock=0,waveClock=10,waveWarned=false,last=performance.now(),shake=0,invuln=0,gate=null,phaseUsed=false,pointerActive=false,pointerTarget={x:W/2,y:H/2};

function stageCfg(){return stages[stage]}
function showWarning(text='危险阵列接近'){let w=$('#warning');w.textContent=text;w.classList.add('show');setTimeout(()=>w.classList.remove('show'),1300)}
function randomObject(){let r=Math.random(),kind=r<stageCfg().risk+hazardBoost?'debris':r<stageCfg().risk+hazardBoost+.14+rareBoost?'rare':'common';objects.push({kind,x:70+Math.random()*(W-140),y:-80,r:kind==='debris'?26+Math.random()*20:kind==='rare'?23:19,speed:(220+Math.random()*150+stage*55)*(kind==='debris'?hazardSpeed:1),drift:(Math.random()-.5)*65,spin:Math.random()*6})}
function dangerWave(){let gap=Math.floor(Math.random()*6),base=(265+stage*65)*hazardSpeed;if(stage===0){for(let i=0;i<7;i++)if(i!==gap&&i!==gap+1)objects.push({kind:'debris',x:(i+.5)*W/7,y:-90-Math.random()*45,r:27,speed:base,drift:0,spin:Math.random()*6})}else if(stage===1){for(let i=0;i<8;i++)if(i!==gap&&i!==gap+1)objects.push({kind:'debris',x:(i+.5)*W/8,y:-80-i*38,r:25+i%2*5,speed:base,drift:i%2?42:-42,spin:Math.random()*6})}else{let safe=1+Math.floor(Math.random()*4);for(let i=0;i<6;i++)if(i!==safe&&i!==safe+1){objects.push({kind:'debris',x:(i+.5)*W/6,y:-70,r:34,speed:base*1.12,drift:0,spin:Math.random()*6});objects.push({kind:'debris',x:(i+.5)*W/6,y:-190,r:28,speed:base,drift:0,spin:Math.random()*6})}}if(!navigator)showWarning(stage===2?'熔毁封锁线接近':'危险阵列接近')}
function burst(x,y,color,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*320,vy:(Math.random()-.5)*320,life:.35+Math.random()*.45,color})}

function collect(o){let value=o.kind==='rare'?30:10,value2=Math.floor(value*stageCfg().mult*yieldMult);runCredits+=value2;stageValue+=value2;burst(o.x,o.y,o.kind==='rare'?'#4fd6d0':'#b8ed58',o.kind==='rare'?18:9)}
function openGate(){gate={x:W/2,y:Math.max(120,H*.18),r:58};$('#objectiveLabel').textContent='撤离门已开启';$('#objectiveValue').textContent='进入光环完成航段'}
function hit(o){if(invuln>0)return;if(defense>0){defense--;invuln=1;burst(o.x,o.y,'#4fd6d0',20);shake=12}else if(phaseReady&&!phaseUsed){phaseUsed=true;invuln=1.2;burst(o.x,o.y,'#ffc94a',28);shake=14;let w=$('#warning');w.textContent='相位航迹抵消致命撞击';w.classList.add('show');setTimeout(()=>{w.classList.remove('show');w.textContent='危险阵列接近'},1300)}else{burst(o.x,o.y,'#ef635f',28);shake=18;finish(false)}}

function stageClear(){state='choice';insured+=stageCfg().bonus;if(stage===2){finish(true);return}$('#reportCode').textContent='STAGE SECURED';$('#reportTitle').textContent='航段已控制';$('#reportCopy').textContent=`你已完成${stageCfg().name}。现在撤离可保留全部资产，继续深入将提高收益，但坠毁只保留 35% 未保险资产。`;$('#finalCargo').textContent=runCredits+' CR';$('#finalDefense').textContent=insured+' CR';$('#earned').textContent='—';$('#extract').textContent='安全撤离';$('#continue').style.display='flex';$('#modal').classList.remove('hidden')}

function finish(success){if(state==='report')return;state='report';let earned=success?runCredits+insured:Math.floor(runCredits*.35)+insured;save.credits=(save.credits||0)+earned;localStorage.setItem(KEY,JSON.stringify(save));$('#reportCode').textContent=success?'EXTRACTION CONFIRMED':'VESSEL LOST';$('#reportTitle').textContent=success?'安全撤离':'船体失效';$('#reportCopy').textContent=success?'全部未保险资产与航段奖励已经入账。':'坠毁只回传了 35% 未保险资产；已完成航段的保险奖励仍然保留。';$('#finalCargo').textContent=runCredits+' CR';$('#finalDefense').textContent=insured+' CR';$('#earned').textContent=earned+' CR';$('#extract').textContent='返回机库';$('#continue').textContent='再次出航';$('#continue').style.display='flex';$('#modal').classList.remove('hidden')}

function nextStage(){stage++;state='playing';stageValue=0;stageElapsed=0;objects=[];gate=null;timeLeft=stageCfg().time+fuel;waveClock=9;waveWarned=false;spawnClock=0;if(has('recharge')&&defense<startDefense)defense++;$('#modal').classList.add('hidden');$('#objectiveLabel').textContent='航段货值目标';last=performance.now();requestAnimationFrame(loop)}
function hud(){let cfg=stageCfg(),secs=Math.max(0,Math.ceil(timeLeft)),mins=Math.floor(secs/60);$('#runCredits').textContent=runCredits+' CR';$('#stageName').textContent=`${stage+1}/3 ${cfg.name}`;$('#defense').textContent=defense;$('#time').textContent=String(mins).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');if(!gate){if(stageValue>=cfg.target&&stageElapsed<cfg.min){$('#objectiveLabel').textContent='航道扫描中';$('#objectiveValue').textContent=`保持存活 ${Math.ceil(cfg.min-stageElapsed)} 秒`}else{$('#objectiveLabel').textContent='航段货值目标';$('#objectiveValue').textContent=`${stageValue} / ${cfg.target} CR`}$('#bar').style.width=Math.min(100,Math.min(stageValue/cfg.target,stageElapsed/cfg.min)*100)+'%'}else $('#bar').style.width='100%'}

function background(t){ctx.fillStyle=stage===0?'#03080a':stage===1?'#080610':'#100604';ctx.fillRect(0,0,W,H);let g=ctx.createRadialGradient(W/2,H*.42,40,W/2,H*.42,Math.max(W,H)*.7);g.addColorStop(0,stage===0?'rgba(25,91,91,.3)':stage===1?'rgba(104,49,126,.34)':'rgba(145,55,22,.34)');g.addColorStop(1,'rgba(2,4,6,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);if(stage===0){ctx.strokeStyle='rgba(79,214,208,.09)';for(let y=(t*.04)%85-85;y<H;y+=85){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}for(let i=0;i<22;i++){let x=(i*173)%W,y=(i*107+t*18)%H;ctx.fillStyle=i%4?'#345052':'#6b8e8d';ctx.fillRect(x,y,3+i%7,2)}}else if(stage===1){ctx.save();ctx.translate(W*.52,H*.42);ctx.rotate(t*.00008);ctx.strokeStyle='rgba(214,92,255,.18)';ctx.lineWidth=18;ctx.beginPath();ctx.arc(0,0,Math.min(W,H)*.34,.2,4.8);ctx.stroke();ctx.lineWidth=3;ctx.strokeStyle='rgba(79,214,208,.22)';ctx.beginPath();ctx.arc(0,0,Math.min(W,H)*.22,1.1,6);ctx.stroke();ctx.restore();for(let i=0;i<28;i++){let x=(i*239+t*(8+i%3))%W,y=(i*83)%H;ctx.fillStyle=i%5?'rgba(180,110,220,.18)':'rgba(79,214,208,.3)';ctx.fillRect(x,y,2,18+i%30)}}else{ctx.strokeStyle='rgba(239,99,95,.2)';ctx.lineWidth=5;for(let i=0;i<7;i++){let x=i*W/6+(Math.sin(t*.001+i)*18);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x-W*.08,H);ctx.stroke()}ctx.fillStyle='rgba(255,124,55,.16)';for(let i=0;i<38;i++){let x=(i*157)%W,y=(i*71+t*(70+i%5*12))%H;ctx.fillRect(x,y,2+i%3,28+i%45)}ctx.fillStyle='rgba(239,99,95,.08)';ctx.fillRect(0,0,W*.1,H);ctx.fillRect(W*.9,0,W*.1,H)}for(let i=0;i<55;i++){let x=(i*197)%W,y=(i*89+t*(13+i%4))%H;ctx.fillStyle='rgba(205,220,216,.14)';ctx.fillRect(x,y,1,1)}}
function drawObject(o){ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.spin);if(o.kind==='common'){ctx.shadowColor='#b8ed58';ctx.shadowBlur=14;ctx.fillStyle='#101a19';ctx.strokeStyle='#9ed84c';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-o.r*.72,-o.r);ctx.lineTo(o.r*.72,-o.r);ctx.lineTo(o.r,o.r*.55);ctx.lineTo(o.r*.5,o.r);ctx.lineTo(-o.r*.5,o.r);ctx.lineTo(-o.r,o.r*.55);ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle='#41544c';ctx.lineWidth=2;ctx.strokeRect(-o.r*.48,-o.r*.45,o.r*.96,o.r*.9);ctx.fillStyle='#b8ed58';ctx.fillRect(-o.r*.18,-3,o.r*.36,6)}else if(o.kind==='rare'){ctx.shadowColor='#4fd6d0';ctx.shadowBlur=20;ctx.fillStyle='#0b171a';ctx.strokeStyle='#4fd6d0';ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<6;i++){let a=i*Math.PI/3;ctx.lineTo(Math.cos(a)*o.r,Math.sin(a)*o.r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.rotate(-o.spin*1.7);ctx.strokeStyle='#94ffff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,o.r*.54,0,Math.PI*1.55);ctx.stroke();ctx.fillStyle='#dfffff';ctx.fillRect(-4,-4,8,8);ctx.fillStyle='#315a5e';ctx.fillRect(-o.r-7,-5,8,10);ctx.fillRect(o.r-1,-5,8,10)}else{ctx.shadowColor='#ef635f';ctx.shadowBlur=9;ctx.fillStyle='#252a2b';ctx.strokeStyle='#ef635f';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-o.r,-o.r*.65);ctx.lineTo(-o.r*.1,-o.r);ctx.lineTo(o.r*.9,-o.r*.35);ctx.lineTo(o.r*.55,o.r*.15);ctx.lineTo(o.r,o.r*.72);ctx.lineTo(o.r*.05,o.r);ctx.lineTo(-o.r*.8,o.r*.45);ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle='#9d6a3d';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-o.r*.65,-o.r*.35);ctx.lineTo(o.r*.55,o.r*.45);ctx.moveTo(-o.r*.15,-o.r*.72);ctx.lineTo(o.r*.15,o.r*.72);ctx.stroke();ctx.fillStyle='#ef635f';ctx.fillRect(o.r*.2,-4,8,8)}ctx.restore()}

function drawGate(t){if(!gate)return;ctx.save();ctx.translate(gate.x,gate.y);ctx.strokeStyle='#ffc94a';ctx.lineWidth=5;ctx.shadowColor='#ffc94a';ctx.shadowBlur=24;ctx.beginPath();ctx.arc(0,0,gate.r+Math.sin(t/180)*5,0,7);ctx.stroke();ctx.setLineDash([8,10]);ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,gate.r+17,0,7);ctx.stroke();ctx.restore()}
function drawShip(){ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);ctx.globalAlpha=invuln>0&&Math.floor(invuln*12)%2?.35:1;ctx.shadowColor='#4fd6d0';ctx.shadowBlur=12;ctx.fillStyle='#aebbb9';ctx.strokeStyle='#526b6d';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(42,0);ctx.lineTo(12,18);ctx.lineTo(-10,34);ctx.lineTo(-22,20);ctx.lineTo(-35,25);ctx.lineTo(-28,7);ctx.lineTo(-38,0);ctx.lineTo(-28,-7);ctx.lineTo(-35,-25);ctx.lineTo(-22,-20);ctx.lineTo(-10,-34);ctx.lineTo(12,-18);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#263a3d';ctx.beginPath();ctx.moveTo(27,0);ctx.lineTo(7,10);ctx.lineTo(-9,7);ctx.lineTo(-15,0);ctx.lineTo(-9,-7);ctx.lineTo(7,-10);ctx.closePath();ctx.fill();ctx.strokeStyle='#76b8b6';ctx.stroke();ctx.fillStyle='#0d2427';ctx.fillRect(-24,-4,23,8);ctx.fillStyle='#b8ed58';ctx.beginPath();ctx.moveTo(-29,-6);ctx.lineTo(-51-Math.random()*8,0);ctx.lineTo(-29,6);ctx.fill();ctx.fillStyle='#4fd6d0';ctx.fillRect(12,-2,7,4);if(defense>0){ctx.strokeStyle='rgba(79,214,208,.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,52+Math.sin(performance.now()/120)*3,0,7);ctx.stroke()}ctx.restore()}
function drawTarget(){if(!pointerActive)return;ctx.save();ctx.strokeStyle='rgba(184,237,88,.45)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(pointerTarget.x,pointerTarget.y,10,0,7);ctx.moveTo(pointerTarget.x-16,pointerTarget.y);ctx.lineTo(pointerTarget.x+16,pointerTarget.y);ctx.moveTo(pointerTarget.x,pointerTarget.y-16);ctx.lineTo(pointerTarget.x,pointerTarget.y+16);ctx.stroke();ctx.restore()}
function draw(t){ctx.save();if(shake){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.82}background(t);drawGate(t);objects.forEach(drawObject);particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,3,3)});ctx.globalAlpha=1;drawTarget();drawShip();ctx.restore()}

function loop(now){if(state!=='playing')return;let dt=Math.min((now-last)/1000,.035);last=now;timeLeft-=dt;stageElapsed+=dt;invuln=Math.max(0,invuln-dt);if(timeLeft<=0){timeLeft=0;hud();draw(now);finish(false);return}if(!gate&&stageValue>=stageCfg().target&&stageElapsed>=stageCfg().min)openGate();let dx=(keys.right?1:0)-(keys.left?1:0),dy=(keys.down?1:0)-(keys.up?1:0);if(!dx&&!dy&&pointerActive){dx=pointerTarget.x-ship.x;dy=pointerTarget.y-ship.y;if(Math.hypot(dx,dy)<12)dx=dy=0}let len=Math.hypot(dx,dy);if(len){dx/=len;dy/=len;ship.x+=dx*speed*dt;ship.y+=dy*speed*dt;
ship.angle=Math.atan2(dy,dx)}ship.x=Math.max(46,Math.min(W-46,ship.x));ship.y=Math.max(88,Math.min(H-46,ship.y));spawnClock+=dt;waveClock-=dt;if(spawnClock>stageCfg().spawn){spawnClock=0;randomObject()}
if(navigator&&waveClock<=1.8&&!waveWarned){waveWarned=true;showWarning('导航预警 · 危险阵列 1.8 秒后抵达')}
if(waveClock<=0){dangerWave();waveClock=9+Math.random()*4;waveWarned=false}
for(let i=objects.length-1;i>=0;i--){let o=objects[i];o.y+=o.speed*dt;o.x+=o.drift*dt;o.spin+=dt*1.8;let d=Math.hypot(o.x-ship.x,o.y-ship.y);if(tractor&&o.kind!=='debris'&&d<tractor){let pull=Math.max(0,1-d/tractor),force=has('tractorWide')?.45+pull*2.5:.65+pull*4;o.x+=(ship.x-o.x)*dt*force;o.y+=(ship.y-o.y)*dt*force}if(d<(42*hitScale)+o.r){o.kind==='debris'?hit(o):collect(o);objects.splice(i,1);if(state!=='playing')break}else if(o.y>H+90||o.x<-100||o.x>W+100)objects.splice(i,1)}
if(state!=='playing'){hud();draw(now);return}
if(gate&&Math.hypot(gate.x-ship.x,gate.y-ship.y)<gate.r+30){gate=null;stageClear();hud();draw(now);return}for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.95;p.vy*=.95;p.life-=dt;if(p.life<=0)particles.splice(i,1)}hud();draw(now);requestAnimationFrame(loop)}

function pause(){if(state==='playing'){state='paused';$('#reportCode').textContent='SYSTEM PAUSED';$('#reportTitle').textContent='作业暂停';$('#reportCopy').textContent='导航、计时和危险阵列已冻结。';$('#finalCargo').textContent=runCredits+' CR';$('#finalDefense').textContent=insured+' CR';$('#earned').textContent='—';$('#extract').textContent='返回机库';$('#continue').textContent='继续作业';$('#continue').style.display='flex';$('#modal').classList.remove('hidden')}else if(state==='paused'){state='playing';$('#modal').classList.add('hidden');last=performance.now();requestAnimationFrame(loop)}}
addEventListener('keydown',e=>{let k=e.key.toLowerCase(),move=['arrowleft','arrowright','arrowup','arrowdown','a','d','w','s'].includes(k);if(move||k==='escape')e.preventDefault();if(move)pointerActive=false;if(k==='arrowleft'||k==='a')keys.left=true;if(k==='arrowright'||k==='d')keys.right=true;if(k==='arrowup'||k==='w')keys.up=true;if(k==='arrowdown'||k==='s')keys.down=true;if(k==='escape'&&!e.repeat)pause()});addEventListener('keyup',e=>{let k=e.key.toLowerCase();if(k==='arrowleft'||k==='a')keys.left=false;if(k==='arrowright'||k==='d')keys.right=false;if(k==='arrowup'||k==='w')keys.up=false;if(k==='arrowdown'||k==='s')keys.down=false});document.querySelectorAll('[data-key]').forEach(b=>{let k=b.dataset.key;b.onpointerdown=()=>{pointerActive=false;keys[k]=true};b.onpointerup=b.onpointerleave=b.onpointercancel=()=>keys[k]=false});
function aim(e){let r=canvas.getBoundingClientRect();pointerTarget.x=(e.clientX-r.left)/r.width*W;pointerTarget.y=(e.clientY-r.top)/r.height*H;pointerActive=true}canvas.onpointermove=aim;canvas.onpointerdown=e=>{aim(e);canvas.setPointerCapture(e.pointerId)};canvas.onpointerup=canvas.onpointercancel=e=>{if(e.pointerType!=='mouse')pointerActive=false};canvas.onpointerleave=e=>{if(e.pointerType==='mouse')pointerActive=false};$('#pause').onclick=pause;$('#extract').onclick=()=>{if(state==='choice')finish(true);else if(state==='report'||state==='paused')location.href='index.html'};$('#continue').onclick=()=>{if(state==='choice')nextStage();else if(state==='paused')pause();else location.reload()};hud();requestAnimationFrame(loop)})();

</script>
