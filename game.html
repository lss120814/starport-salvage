<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#030608"><title>VOID//SALVAGE — 作业区</title>
  <style>
    :root{--green:#b8ed58;--cyan:#4fd6d0;--red:#ef635f;--text:#e9edea;--muted:#738186;--line:#2b383d}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#030608;color:var(--text);font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif}button{font:inherit}#game{position:fixed;inset:0}canvas{display:block;width:100%;height:100%;touch-action:none}.hud{position:absolute;inset:0;pointer-events:none;padding:22px clamp(16px,3vw,42px);display:flex;flex-direction:column;justify-content:space-between}.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:start}.block{display:flex;gap:34px}.block.right{justify-content:flex-end;text-align:right}.datum span,.micro{display:block;color:var(--muted);font:700 9px/1.2 ui-monospace,monospace;letter-spacing:.16em}.datum strong{display:block;font:800 22px/1 ui-monospace,monospace;margin-top:7px}.timer{min-width:150px;padding:10px 24px;background:rgba(4,8,10,.8);border-top:2px solid var(--green);text-align:center}.timer strong{font:800 29px/1 ui-monospace,monospace}.timer span{display:block;color:var(--muted);font:700 8px/1 ui-monospace,monospace;letter-spacing:.15em;margin-bottom:5px}.def{color:var(--cyan)}.hull{color:var(--red)}.bottom{display:flex;justify-content:space-between;align-items:end}.legend{background:rgba(4,8,10,.72);border-left:1px solid var(--line);padding:11px 15px;color:#68777a;font:10px/1.75 ui-monospace,monospace}.legend b{font-weight:800}.legend .a{color:var(--green)}.legend .b{color:var(--cyan)}.legend .c{color:var(--red)}.progress{width:min(420px,44vw)}.progress-top{display:flex;justify-content:space-between;color:var(--muted);font:700 9px/1 ui-monospace,monospace;margin-bottom:7px}.bar{height:4px;background:#1c272b}.bar i{display:block;width:0;height:100%;background:var(--green);box-shadow:0 0 13px rgba(184,237,88,.5)}.pause{position:absolute;right:18px;top:50%;width:42px;height:42px;transform:translateY(-50%);pointer-events:auto;border:1px solid #3a494e;background:rgba(5,9,11,.78);color:#a9b3b1;cursor:pointer}.modal{position:absolute;inset:0;display:grid;place-items:center;background:rgba(2,5,7,.84);backdrop-filter:blur(8px);z-index:5}.hidden{display:none}.report{width:min(620px,calc(100% - 30px));padding:clamp(26px,5vw,48px);border:1px solid #35444a;background:#091014;box-shadow:0 40px 120px #000}.line{height:2px;width:55px;background:var(--green);margin-bottom:22px}.report h1{font-size:clamp(38px,6vw,64px);line-height:1;margin:6px 0 12px;letter-spacing:-.05em}.report>p{color:#879496;line-height:1.7;margin:0 0 27px}.stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);margin-bottom:25px}.stats div{padding:16px;border-right:1px solid var(--line)}.stats div:last-child{border:0}.stats span{display:block;color:var(--muted);font:700 9px/1 ui-monospace,monospace}.stats strong{display:block;font:800 22px/1 ui-monospace,monospace;margin-top:8px}.stats .earned{color:var(--green)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions a,.actions button{height:52px;display:flex;align-items:center;justify-content:center;border:1px solid #3b4a4f;background:transparent;color:white;text-decoration:none;font-weight:800;cursor:pointer}.actions .primary{background:var(--green);border-color:var(--green);color:#091009}.mobile{display:none;position:absolute;left:50%;bottom:18px;transform:translateX(-50%);grid-template-columns:repeat(4,54px);gap:7px;pointer-events:auto}.mobile button{height:46px;border:1px solid #3b4a4f;background:rgba(5,9,11,.82);color:white}.launch-flash{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;background:#030608;z-index:4;animation:flash 1.2s ease forwards}.launch-flash strong{font:800 12px/1 ui-monospace,monospace;letter-spacing:.25em;color:var(--green)}@keyframes flash{0%,55%{opacity:1}100%{opacity:0;visibility:hidden}}
    @media(max-width:650px){.hud{padding:14px 12px}.top{grid-template-columns:1fr auto}.block{gap:14px}.block.right{display:none}.datum strong{font-size:17px}.timer{min-width:105px;padding:8px 10px}.timer strong{font-size:22px}.legend{display:none}.progress{width:72vw;margin-bottom:60px}.pause{top:auto;bottom:75px;right:12px;transform:none}.mobile{display:grid}.stats strong{font-size:17px}.actions{grid-template-columns:1fr}}
  </style>
</head>
<body><div id="game"><canvas id="canvas" width="1600" height="900"></canvas><div class="launch-flash"><strong>SECTOR LINK ESTABLISHED</strong></div>
  <div class="hud"><div class="top"><div class="block"><div class="datum"><span>RUN CREDITS</span><strong id="runCredits">0 CR</strong></div><div class="datum"><span>CARGO</span><strong id="cargo">0</strong></div></div><div class="timer"><span>EXTRACTION</span><strong id="time">00:05</strong></div><div class="block right"><div class="datum"><span>DEFENSE</span><strong class="def" id="defense">0</strong></div><div class="datum"><span>HULL</span><strong class="hull">I</strong></div></div></div><div class="bottom"><div class="legend"><b class="a">◆</b> 标准资产　<b class="b">◎</b> 高价值资产　<b class="c">▰</b> 致命残骸<br>WASD / 方向键移动　·　飞船以当前移速朝鼠标方向航行</div><div class="progress"><div class="progress-top"><span>EXTRACTION PROGRESS</span><span id="percent">0%</span></div><div class="bar"><i id="bar"></i></div></div></div></div>
  <button class="pause" id="pause">Ⅱ</button><div class="mobile"><button data-key="left">←</button><button data-key="up">↑</button><button data-key="down">↓</button><button data-key="right">→</button></div>
  <div class="modal hidden" id="modal"><div class="report"><div class="line"></div><span class="micro" id="reportCode">MISSION REPORT</span><h1 id="reportTitle">撤离完成</h1><p id="reportCopy">已回收资产完成清点。</p><div class="stats"><div><span>CARGO</span><strong id="finalCargo">0</strong></div><div><span>DEFENSE LEFT</span><strong id="finalDefense">0</strong></div><div><span>CREDITS</span><strong class="earned">+<span id="earned">0</span></strong></div></div><div class="actions"><a href="tree.html">进入成长树</a><button class="primary" id="retry">再次出航</button></div></div></div>
  </div>
  <script>
  const $=s=>document.querySelector(s),KEY='void-salvage-tree-v3',W=1600,H=900,canvas=$('#canvas'),ctx=canvas.getContext('2d');
  let save=JSON.parse(localStorage.getItem(KEY)||'null')||{credits:0,owned:[]};save.owned??=[];const has=id=>save.owned.includes(id);
  const duration=5+(has('time1')?5:0)+(has('time2')?8:0)+(has('time3')?12:0)+(has('apex')?10:0),speed=560*(1+(has('engine1')?.12:0)+(has('engine2')?.15:0)+(has('apex')?.18:0)),tractor=has('tractor2')?140:has('tractor1')?70:0,yieldMult=1+(has('yield1')?.25:0)+(has('yield2')?.35:0),startDefense=(has('shield1')?1:0)+(has('shield2')?1:0);
  let state='playing',ship={x:800,y:720},objects=[],particles=[],keys={},runCredits=0,cargo=0,defense=startDefense,timeLeft=duration,spawn=0,last=performance.now(),shake=0;
  function addObject(){let r=Math.random(),kind=r<.15?'rare':r<.46?'debris':'common';objects.push({kind,x:70+Math.random()*(W-140),y:-80,r:kind==='debris'?28+Math.random()*27:kind==='rare'?24:20,speed:290+Math.random()*210+(duration-timeLeft)*9,drift:(Math.random()-.5)*70,spin:Math.random()*6})}
  function burst(x,y,color,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*350,vy:(Math.random()-.5)*350,life:.35+Math.random()*.45,color})}
  function collect(o){let value=o.kind==='rare'?30:10;runCredits+=Math.floor(value*yieldMult);cargo++;burst(o.x,o.y,o.kind==='rare'?'#4fd6d0':'#b8ed58',o.kind==='rare'?20:10)}
  function hit(o){if(defense>0)defense--;else{burst(o.x,o.y,'#ef635f',28);shake=18;finish(false);return}burst(o.x,o.y,'#4fd6d0',20);shake=12}
  function finish(success){if(state==='report')return;state='report';let bonus=success?25:0,earned=runCredits+bonus;save.credits+=earned;localStorage.setItem(KEY,JSON.stringify(save));$('#reportCode').textContent=success?'EXTRACTION CONFIRMED':'VESSEL LOST';$('#reportTitle').textContent=success?'撤离完成':'船体失效';$('#reportCopy').textContent=success?'回收资产与撤离奖励已入账。成长树中可能已有新节点可用。':'本次已回传资产仍会结算。安装防御节点后，撞击可由护盾吸收。';$('#finalCargo').textContent=cargo;$('#finalDefense').textContent=defense;$('#earned').textContent=earned;$('#modal').classList.remove('hidden')}
  function hud(){$('#runCredits').textContent=runCredits+' CR';$('#cargo').textContent=cargo;$('#defense').textContent=defense;let s=Math.max(0,Math.ceil(timeLeft));$('#time').textContent='00:'+String(s).padStart(2,'0');let p=Math.min(100,(duration-timeLeft)/duration*100);$('#bar').style.width=p+'%';$('#percent').textContent=Math.floor(p)+'%'}
  function background(t){ctx.fillStyle='#030608';ctx.fillRect(0,0,W,H);let g=ctx.createRadialGradient(800,420,50,800,420,900);g.addColorStop(0,'rgba(30,70,70,.23)');g.addColorStop(1,'rgba(2,4,6,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(let i=0;i<110;i++){let x=(i*197)%W,y=(i*89+t*(14+i%4))%H;ctx.fillStyle=`rgba(180,205,200,${.08+(i%6)*.03})`;ctx.fillRect(x,y,i%17?1:3,1)}ctx.strokeStyle='rgba(100,145,140,.06)';for(let y=(t*.045)%90-90;y<H;y+=90){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}
  function drawCommon(o){ctx.shadowColor='#b8ed58';ctx.shadowBlur=22;ctx.fillStyle='#152114';ctx.strokeStyle='#b8ed58';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,-o.r);ctx.lineTo(o.r,0);ctx.lineTo(0,o.r);ctx.lineTo(-o.r,0);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#b8ed58';ctx.fillRect(-4,-4,8,8)}
  function drawRare(o){ctx.shadowColor='#4fd6d0';ctx.shadowBlur=30;ctx.strokeStyle='#4fd6d0';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,o.r,0,7);ctx.stroke();ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,o.r*.52,0,7);ctx.stroke();ctx.fillStyle='#d8ffff';ctx.beginPath();ctx.arc(0,0,4,0,7);ctx.fill()}
  function drawDebris(o){ctx.shadowColor='#ef635f';ctx.shadowBlur=12;ctx.fillStyle='#5b2827';ctx.strokeStyle='#ef635f';ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<8;i++){let a=i*Math.PI/4,r=o.r*(i%2?.72:1);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.save();ctx.clip();ctx.strokeStyle='#d99a52';ctx.lineWidth=5;for(let x=-o.r*2;x<o.r*2;x+=16){ctx.beginPath();ctx.moveTo(x,-o.r*1.5);ctx.lineTo(x+o.r*2,o.r*1.5);ctx.stroke()}ctx.restore()}
  function drawObject(o){ctx.save();ctx.translate(o.x,o.y);ctx.rotate(o.spin);o.kind==='common'?drawCommon(o):o.kind==='rare'?drawRare(o):drawDebris(o);ctx.restore()}
  function drawShip(){ctx.save();ctx.translate(ship.x,ship.y);ctx.shadowColor='#4fd6d0';ctx.shadowBlur=15;ctx.fillStyle='#dce4e0';ctx.strokeStyle='#5c7574';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,-34);ctx.lineTo(39,29);ctx.lineTo(11,19);ctx.lineTo(0,31);ctx.lineTo(-11,19);ctx.lineTo(-39,29);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#174c4f';ctx.fillRect(-7,-14,14,29);ctx.fillStyle='#b8ed58';ctx.beginPath();ctx.moveTo(-8,29);ctx.lineTo(0,55+Math.random()*7);ctx.lineTo(8,29);ctx.fill();if(defense>0){ctx.strokeStyle='rgba(79,214,208,.65)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,54+Math.sin(performance.now()/120)*3,0,7);ctx.stroke()}ctx.restore()}
  function draw(t){ctx.save();if(shake){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.8}background(t);objects.forEach(drawObject);particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,3,3);ctx.globalAlpha=1});drawShip();ctx.restore()}
  function loop(now){if(state!=='playing')return;let dt=Math.min((now-last)/1000,.035);last=now;timeLeft-=dt;if(timeLeft<=0){timeLeft=0;hud();draw(now);finish(true);return}let m=speed*dt;if(keys.left)ship.x-=m;if(keys.right)ship.x+=m;if(keys.up)ship.y-=m;if(keys.down)ship.y+=m;if(pointerActive&&!keys.left&&!keys.right&&!keys.up&&!keys.down){let dx=pointerTarget.x-ship.x,dy=pointerTarget.y-ship.y,d=Math.hypot(dx,dy);if(d>8){let step=Math.min(m,d);ship.x+=dx/d*step;ship.y+=dy/d*step}}ship.x=Math.max(48,Math.min(W-48,ship.x));ship.y=Math.max(100,Math.min(H-48,ship.y));spawn+=dt;if(spawn>Math.max(.28,.62-(duration-timeLeft)*.008)){spawn=0;addObject()}for(let i=objects.length-1;i>=0;i--){let o=objects[i];o.y+=o.speed*dt;o.x+=o.drift*dt;o.spin+=dt*1.8;let d=Math.hypot(o.x-ship.x,o.y-ship.y);if(tractor&&o.kind!=='debris'&&d<tractor){let pull=(1-d/tractor);o.x+=(ship.x-o.x)*dt*(.6+pull*4.2);o.y+=(ship.y-o.y)*dt*(.6+pull*4.2)}let hitRange=44+o.r;if(d<hitRange){o.kind==='debris'?hit(o):collect(o);objects.splice(i,1)}else if(o.y>H+90)objects.splice(i,1)}for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.95;p.vy*=.95;p.life-=dt;if(p.life<=0)particles.splice(i,1)}hud();draw(now);requestAnimationFrame(loop)}
  function pause(){if(state==='playing'){state='paused';$('#reportCode').textContent='SYSTEM PAUSED';$('#reportTitle').textContent='作业暂停';$('#reportCopy').textContent='导航与计时已冻结。';$('#finalCargo').textContent=cargo;$('#finalDefense').textContent=defense;$('#earned').textContent='—';$('#retry').textContent='继续作业';$('#modal').classList.remove('hidden')}else if(state==='paused'){state='playing';$('#modal').classList.add('hidden');$('#retry').textContent='再次出航';last=performance.now();requestAnimationFrame(loop)}}
  addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(['arrowleft','arrowright','arrowup','arrowdown',' ','a','d','w','s'].includes(k))e.preventDefault();if(k==='arrowleft'||k==='a')keys.left=true;if(k==='arrowright'||k==='d')keys.right=true;if(k==='arrowup'||k==='w')keys.up=true;if(k==='arrowdown'||k==='s')keys.down=true;if(k===' ')pause()});addEventListener('keyup',e=>{let k=e.key.toLowerCase();if(k==='arrowleft'||k==='a')keys.left=false;if(k==='arrowright'||k==='d')keys.right=false;if(k==='arrowup'||k==='w')keys.up=false;if(k==='arrowdown'||k==='s')keys.down=false});
  document.querySelectorAll('[data-key]').forEach(b=>{let k=b.dataset.key;b.onpointerdown=()=>keys[k]=true;b.onpointerup=b.onpointerleave=b.onpointercancel=()=>keys[k]=false});
  let pointerActive=false,pointerTarget={x:W/2,y:H/2};
  function aimPointer(e){let r=canvas.getBoundingClientRect();pointerTarget.x=(e.clientX-r.left)/r.width*W;pointerTarget.y=(e.clientY-r.top)/r.height*H;pointerActive=true}
  canvas.onpointermove=aimPointer;canvas.onpointerdown=e=>{aimPointer(e);canvas.setPointerCapture(e.pointerId)};canvas.onpointerup=canvas.onpointercancel=e=>{if(e.pointerType!=='mouse')pointerActive=false;try{canvas.releasePointerCapture(e.pointerId)}catch{}};canvas.onpointerleave=e=>{if(e.pointerType==='mouse')pointerActive=false};
  $('#pause').onclick=pause;$('#retry').onclick=()=>{if(state==='paused'){pause();return}location.reload()};hud();requestAnimationFrame(loop);
  </script>
</body></html>
